<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pana - Tu Amigo Venezolano</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a1628;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: linear-gradient(135deg, #1a2a4a 0%, #0d1b2a 100%);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e3a5f;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7d047 0%, #e8a838 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .header-info h1 {
            font-size: 17px;
            font-weight: 600;
            color: #ffffff;
        }

        .header-info p {
            font-size: 12px;
            color: #7eb8da;
        }

        .config-bar {
            background: #0d1b2a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1e3a5f;
            font-size: 13px;
        }

        .config-bar label {
            color: #7eb8da;
        }

        .config-bar select {
            background: #1a2a4a;
            color: #e0e0e0;
            border: 1px solid #2a4a6a;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 13px;
        }

        .status-pill {
            margin-left: auto;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-pill.active {
            background: #1a4a2a;
            color: #4ade80;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            background: #1e5a8a;
            color: #ffffff;
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: #1a2a4a;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a4a6a;
        }

        .message.bot .meta {
            margin-top: 8px;
            font-size: 11px;
            color: #5a8aaa;
        }

        .message.system {
            align-self: center;
            background: #2a1a1a;
            color: #ff6b6b;
            font-size: 12px;
            border: 1px solid #4a2a2a;
        }

        .typing {
            align-self: flex-start;
            padding: 12px 16px;
            background: #1a2a4a;
            border-radius: 16px;
            border: 1px solid #2a4a6a;
            display: none;
        }

        .typing span {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #5a8aaa;
            margin: 0 2px;
            animation: bounce 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 16px 20px;
            background: #0d1b2a;
            border-top: 1px solid #1e3a5f;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px solid #2a4a6a;
            background: #1a2a4a;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-area input:focus {
            border-color: #4a8aba;
        }

        .input-area input::placeholder {
            color: #5a7a9a;
        }

        .input-area button {
            padding: 12px 20px;
            border-radius: 24px;
            border: none;
            background: linear-gradient(135deg, #f7d047 0%, #e8a838 100%);
            color: #0a1628;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .input-area button:hover {
            transform: scale(1.02);
        }

        .input-area button:active {
            transform: scale(0.98);
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: #5a8aaa;
        }

        .welcome h2 {
            color: #f7d047;
            margin-bottom: 8px;
            font-size: 20px;
        }

        .welcome p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .flag {
            font-size: 28px;
            margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="avatar">🇻🇪</div>
        <div class="header-info">
            <h1>Pana</h1>
            <p>Tu amigo venezolano - Travel Assistant</p>
        </div>
    </div>

    <div class="config-bar">
        <label>Simulate origin:</label>
        <select id="phonePrefix">
            <option value="+58">Venezuela (+58)</option>
            <option value="+57">Colombia (+57)</option>
            <option value="+52">Mexico (+52)</option>
            <option value="+34">Spain (+34)</option>
            <option value="+1" selected>USA/Canada (+1)</option>
            <option value="+55">Brazil (+55)</option>
            <option value="+33">France (+33)</option>
            <option value="+49">Germany (+49)</option>
            <option value="+39">Italy (+39)</option>
            <option value="+44">UK (+44)</option>
        </select>
        <span class="status-pill active" id="statusPill">Ready</span>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <div class="flag">🇻🇪</div>
            <h2>Bienvenido! Welcome!</h2>
            <p>I'm Pana, your Venezuelan travel friend. Ask me about adventures, treks, beaches, or city tours. Select your country above to see how I adapt my tone!</p>
        </div>
    </div>

    <div class="typing" id="typing">
        <span></span><span></span><span></span>
    </div>

    <div class="input-area">
        <input type="text" id="messageInput" placeholder="Write a message..." autocomplete="off">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const typing = document.getElementById('typing');
        const statusPill = document.getElementById('statusPill');
        const phonePrefix = document.getElementById('phonePrefix');

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            messageInput.value = '';
            showTyping(true);
            statusPill.textContent = 'Thinking...';
            statusPill.style.background = '#3a3a1a';
            statusPill.style.color = '#f7d047';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        phone_prefix: phonePrefix.value
                    })
                });

                const data = await res.json();
                showTyping(false);
                addMessage(data.response, 'bot', `${data.detected_language} | ${data.register} | ${data.origin}`);
                statusPill.textContent = 'Ready';
                statusPill.style.background = '#1a4a2a';
                statusPill.style.color = '#4ade80';
            } catch (err) {
                showTyping(false);
                addMessage('Connection error. Please try again.', 'system');
                statusPill.textContent = 'Error';
                statusPill.style.background = '#4a1a1a';
                statusPill.style.color = '#ff6b6b';
            }
        }

        function linkify(text) {
            return text.replace(
                /(\[([^\]]+)\]\((https?:\/\/[^\s)]+)\))/g,
                '<a href="$3" target="_blank" style="color: #f7d047; text-decoration: underline;">$2</a>'
            ).replace(
                /(?<!\])\((https?:\/\/[^\s)]+)\)/g,
                '(<a href="$1" target="_blank" style="color: #f7d047; text-decoration: underline;">$1</a>)'
            ).replace(
                /(?<!")(https?:\/\/[^\s<)]+)/g,
                '<a href="$1" target="_blank" style="color: #f7d047; text-decoration: underline;">$1</a>'
            );
        }

        function addMessage(text, type, meta = '') {
            const welcome = document.querySelector('.welcome');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = `message ${type}`;
            if (type === 'bot') {
                div.innerHTML = linkify(text);
            } else {
                div.textContent = text;
            }

            if (meta && type === 'bot') {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'meta';
                metaDiv.textContent = meta;
                div.appendChild(metaDiv);
            }

            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function showTyping(show) {
            typing.style.display = show ? 'block' : 'none';
            if (show) {
                chatContainer.appendChild(typing);
                chatContainer.scrollTop = chatContainer.scrollHeight;
            }
        }

        phonePrefix.addEventListener('change', async () => {
            await fetch('/api/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone_prefix: phonePrefix.value })
            });
            chatContainer.innerHTML = '';
            const notice = document.createElement('div');
            notice.className = 'message system';
            notice.textContent = `Session reset. Now simulating: ${phonePrefix.options[phonePrefix.selectedIndex].text}`;
            chatContainer.appendChild(notice);
        });
    </script>
</body>
</html>
